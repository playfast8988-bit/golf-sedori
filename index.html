<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ゴルフせどり OCR</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0c1117;
    --card: #161b22;
    --border: #30363d;
    --green: #2ea043;
    --green-bright: #3fb950;
    --blue: #388bfd;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --orange: #d29922;
    --red: #f85149;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 80px;
  }

  /* ===== Header ===== */
  .app-header {
    background: linear-gradient(135deg, #1a472a 0%, #0d2818 100%);
    padding: 20px 16px 18px;
    border-bottom: 1px solid #2ea04330;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .app-header .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .app-header .logo-icon {
    width: 36px;
    height: 36px;
    background: var(--green);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .app-header h1 {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
  }

  .app-header .subtitle {
    font-size: 11px;
    color: var(--green-bright);
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ===== Tab Navigation ===== */
  .tabs {
    display: flex;
    background: var(--card);
    border-bottom: 1px solid var(--border);
  }

  .tab {
    flex: 1;
    padding: 12px 8px;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .tab.active {
    color: var(--green-bright);
    border-bottom-color: var(--green-bright);
  }

  /* ===== Main Content ===== */
  .page { display: none; padding: 16px; }
  .page.active { display: block; }

  /* ===== Capture Area ===== */
  .capture-area {
    border: 2px dashed var(--border);
    border-radius: 16px;
    overflow: hidden;
    background: var(--card);
    min-height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.3s;
    position: relative;
  }

  .capture-area.has-image { border-color: var(--green); }

  .capture-area img {
    max-width: 100%;
    max-height: 350px;
    display: block;
  }

  .placeholder {
    text-align: center;
    padding: 36px 20px;
  }

  .placeholder .icon { font-size: 44px; margin-bottom: 10px; }

  .placeholder p {
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.6;
  }

  .placeholder .hint {
    font-size: 12px;
    color: #484f58;
    margin-top: 8px;
  }

  /* ===== Buttons ===== */
  .btn-row { display: flex; gap: 10px; margin: 14px 0; }

  .btn {
    flex: 1;
    padding: 13px 14px;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:active { transform: scale(0.97); }

  .btn-camera { background: var(--green); color: #fff; }
  .btn-gallery { background: var(--card); color: var(--text); border: 1px solid var(--border); }

  .btn-scan {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #238636, #1a7f37);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-scan:active { transform: scale(0.97); }
  .btn-scan:disabled { opacity: 0.6; }
  .btn-scan.visible { display: flex; }

  /* ===== Progress ===== */
  .progress-container { display: none; margin: 14px 0; }
  .progress-container.visible { display: block; }

  .progress-bar-bg {
    background: var(--card);
    border-radius: 8px;
    height: 6px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--green-bright));
    border-radius: 8px;
    width: 0%;
    transition: width 0.3s ease;
  }

  .progress-label {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 6px;
    text-align: center;
  }

  /* ===== Model Number Card ===== */
  .model-card {
    display: none;
    background: var(--card);
    border: 1px solid var(--green);
    border-radius: 14px;
    margin-top: 16px;
    overflow: hidden;
  }

  .model-card.visible { display: block; }

  .model-card-header {
    background: #1a472a;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .model-card-header h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--green-bright);
  }

  .model-number {
    padding: 16px;
    text-align: center;
  }

  .model-number .detected {
    font-size: 26px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 1px;
    word-break: break-all;
    cursor: pointer;
    padding: 8px;
    border-radius: 8px;
    transition: background 0.2s;
  }

  .model-number .detected:active {
    background: #30363d;
  }

  .model-number .tap-hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
  }

  .model-number input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    text-align: center;
    margin-top: 8px;
    outline: none;
  }

  .model-number input:focus { border-color: var(--green); }

  /* ===== Search Buttons ===== */
  .search-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 0 16px 16px;
  }

  .search-btn {
    padding: 12px 10px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    text-decoration: none;
  }

  .search-btn:active { transform: scale(0.96); }

  .search-btn.mercari { border-color: #e04040; color: #ff6060; }
  .search-btn.yahoo { border-color: #ff6633; color: #ff8855; }
  .search-btn.rakuten { border-color: #bf0000; color: #ff4444; }
  .search-btn.amazon { border-color: #ff9900; color: #ffaa33; }
  .search-btn.google { border-color: var(--blue); color: var(--blue); }
  .search-btn.golfdo { border-color: var(--green); color: var(--green-bright); }

  /* ===== Full OCR Text ===== */
  .raw-text-section {
    display: none;
    margin-top: 16px;
  }

  .raw-text-section.visible { display: block; }

  .raw-text-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .raw-text-toggle span {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
  }

  .raw-text-toggle .arrow {
    transition: transform 0.2s;
    color: var(--text-muted);
  }

  .raw-text-toggle.open .arrow { transform: rotate(180deg); }

  .raw-text-box {
    display: none;
    background: var(--card);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 10px 10px;
    padding: 14px;
    font-size: 13px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--text-muted);
    max-height: 250px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .raw-text-box.open { display: block; }

  .confidence-badge {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }

  .conf-high { background: #1a472a; color: var(--green-bright); }
  .conf-mid { background: #3d2e00; color: var(--orange); }
  .conf-low { background: #3d1010; color: var(--red); }

  /* ===== History Tab ===== */
  .history-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .history-empty .icon { font-size: 40px; margin-bottom: 12px; }

  .history-list { display: flex; flex-direction: column; gap: 8px; }

  .history-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: border-color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .history-item:active { border-color: var(--green); }

  .history-item .thumb {
    width: 50px;
    height: 50px;
    border-radius: 8px;
    object-fit: cover;
    background: var(--bg);
    flex-shrink: 0;
  }

  .history-item .info { flex: 1; min-width: 0; }

  .history-item .model-name {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .history-item .timestamp {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .history-item .search-icon {
    color: var(--text-muted);
    font-size: 18px;
  }

  .history-clear {
    display: block;
    margin: 16px auto 0;
    padding: 10px 20px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
  }

  /* ===== Tips ===== */
  .tips {
    margin-top: 20px;
    padding: 14px;
    background: var(--card);
    border-radius: 12px;
    border: 1px solid var(--border);
  }

  .tips h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .tips ul { list-style: none; }

  .tips li {
    font-size: 12px;
    color: #484f58;
    padding: 2px 0;
    line-height: 1.5;
  }

  .tips li::before { content: '• '; color: var(--green); }

  /* ===== Bottom Nav ===== */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: var(--card);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 8px 0 max(8px, env(safe-area-inset-bottom));
    z-index: 100;
  }

  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 6px 0;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    color: var(--text-muted);
    font-size: 10px;
    font-weight: 500;
    transition: color 0.2s;
  }

  .nav-item.active { color: var(--green-bright); }
  .nav-item .nav-icon { font-size: 22px; }

  /* ===== Utility ===== */
  input[type="file"] { display: none; }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .fade-in {
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<!-- ===== Header ===== -->
<div class="app-header">
  <div class="logo">
    <div class="logo-icon">⛳</div>
    <div>
      <h1>Golf Sedori OCR</h1>
      <div class="subtitle">型番スキャナー</div>
    </div>
  </div>
</div>

<!-- ===== Pages ===== -->

<!-- Scan Page -->
<div class="page active" id="pageScan">

  <div class="capture-area" id="captureArea">
    <div class="placeholder" id="placeholder">
      <div class="icon">🏌️</div>
      <p>クラブの銘板・シャフトの<br>型番部分を撮影してください</p>
      <div class="hint">モデル名・ロフト角・シャフト情報を自動抽出</div>
    </div>
    <img id="preview" style="display:none" alt="プレビュー">
  </div>

  <div class="btn-row">
    <button class="btn btn-camera" onclick="openCamera()">📷 撮影</button>
    <button class="btn btn-gallery" onclick="openGallery()">🖼 選択</button>
  </div>

  <button class="btn-scan" id="scanBtn" onclick="startOCR()">
    🔍 型番を読み取る
  </button>

  <div class="progress-container" id="progressContainer">
    <div class="progress-bar-bg">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="progress-label" id="progressLabel">準備中...</div>
  </div>

  <!-- Model Number Result Card -->
  <div class="model-card" id="modelCard">
    <div class="model-card-header">
      <h3>⛳ 検出された型番</h3>
      <span id="confBadge" class="confidence-badge"></span>
    </div>
    <div class="model-number">
      <div class="detected" id="detectedModel" onclick="copyModel()"></div>
      <div class="tap-hint">タップでコピー</div>
      <input type="text" id="modelInput" placeholder="型番を修正・入力">
    </div>
    <div class="search-grid">
      <a class="search-btn mercari" id="linkMercari" target="_blank">🔴 メルカリ</a>
      <a class="search-btn yahoo" id="linkYahoo" target="_blank">🟠 ヤフオク</a>
      <a class="search-btn rakuten" id="linkRakuten" target="_blank">🔴 楽天</a>
      <a class="search-btn amazon" id="linkAmazon" target="_blank">🟡 Amazon</a>
      <a class="search-btn golfdo" id="linkGolfdo" target="_blank">⛳ ゴルフドゥ</a>
      <a class="search-btn google" id="linkGoogle" target="_blank">🔵 Google</a>
    </div>
  </div>

  <!-- Raw OCR Text -->
  <div class="raw-text-section" id="rawTextSection">
    <div class="raw-text-toggle" id="rawToggle" onclick="toggleRawText()">
      <span>全文テキストを表示</span>
      <span class="arrow">▼</span>
    </div>
    <div class="raw-text-box" id="rawTextBox"></div>
  </div>

  <div class="tips" id="tips">
    <h3>読み取りのコツ</h3>
    <ul>
      <li>シャフトの印字やソール部分の刻印を狙う</li>
      <li>銘板が水平になるよう角度を調整</li>
      <li>明るい場所で影が入らないように撮影</li>
      <li>読み取り後、型番は手動で修正可能</li>
    </ul>
  </div>

</div>

<!-- History Page -->
<div class="page" id="pageHistory">
  <div class="history-empty" id="historyEmpty">
    <div class="icon">📋</div>
    <p>まだ読み取り履歴がありません</p>
  </div>
  <div class="history-list" id="historyList"></div>
  <button class="history-clear" id="historyClearBtn" onclick="clearHistory()" style="display:none">履歴をクリア</button>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="switchPage('scan')" id="navScan">
    <span class="nav-icon">📷</span>
    スキャン
  </div>
  <div class="nav-item" onclick="switchPage('history')" id="navHistory">
    <span class="nav-icon">📋</span>
    履歴
  </div>
</div>

<!-- Hidden Inputs -->
<input type="file" id="cameraInput" accept="image/*" capture="environment">
<input type="file" id="galleryInput" accept="image/*">

<script>
// ===== Elements =====
const cameraInput = document.getElementById('cameraInput');
const galleryInput = document.getElementById('galleryInput');
const preview = document.getElementById('preview');
const placeholder = document.getElementById('placeholder');
const captureArea = document.getElementById('captureArea');
const scanBtn = document.getElementById('scanBtn');
const progressContainer = document.getElementById('progressContainer');
const progressBar = document.getElementById('progressBar');
const progressLabel = document.getElementById('progressLabel');
const modelCard = document.getElementById('modelCard');
const detectedModel = document.getElementById('detectedModel');
const modelInput = document.getElementById('modelInput');
const confBadge = document.getElementById('confBadge');
const rawTextSection = document.getElementById('rawTextSection');
const rawToggle = document.getElementById('rawToggle');
const rawTextBox = document.getElementById('rawTextBox');
const tips = document.getElementById('tips');

let currentImageData = null;
let scanHistory = [];

// ===== Golf Brand & Model Patterns =====
const golfBrands = [
  'TITLEIST', 'CALLAWAY', 'TAYLORMADE', 'TAYLOR MADE', 'PING', 'MIZUNO',
  'BRIDGESTONE', 'DUNLOP', 'XXIO', 'SRIXON', 'CLEVELAND', 'COBRA',
  'ODYSSEY', 'SCOTTY CAMERON', 'HONMA', 'YAMAHA', 'PRGR', 'FOURTEEN',
  'ONOFF', 'DAIWA', 'GLOBERIDE', 'KATANA', 'MARUMAN', 'RYOMA',
  'BALDO', 'EPON', 'MIURA', 'JUSTICK', 'NEXGEN', 'YONEX',
  'TOURSTAGE', 'MACGREGOR', 'ADAMS', 'WILSON', 'NIKE',
  'テーラーメイド', 'キャロウェイ', 'タイトリスト', 'ピン', 'ミズノ',
  'ブリヂストン', 'ダンロップ', 'ゼクシオ', 'スリクソン', 'ホンマ',
  'ヤマハ', 'オデッセイ', 'コブラ', 'クリーブランド', 'フォーティーン',
  'オノフ', 'カタナ', 'マルマン', 'リョーマ', 'ヨネックス'
];

const shaftBrands = [
  'DYNAMIC GOLD', 'NS PRO', 'MODUS', 'PROJECT X', 'KBS', 'TRUE TEMPER',
  'GRAPHITE DESIGN', 'FUJIKURA', 'MITSUBISHI', 'DIAMANA', 'SPEEDER',
  'TOUR AD', 'VENTUS', 'TENSEI', 'ATTAS', 'SHAFT',
  'ダイナミックゴールド', 'モーダス', 'ディアマナ', 'スピーダー', 'ツアーAD'
];

// Known model patterns (common golf club model names/numbers)
const modelPatterns = [
  // Alphanumeric model patterns
  /\b[A-Z]{2,}[\s-]?\d{2,4}[A-Z]?\b/g,           // e.g., SIM2, TSR3, G430
  /\b\d{3,4}[\s-]?[A-Z]{1,3}\b/g,                  // e.g., 913D, 620MB
  /\b[A-Z]+[\s-]\d+[\s-][A-Z]+\b/g,                // e.g., ROGUE ST MAX
  /\b(?:PRO|MAX|MINI|PLUS|LS|ST|Ti|SE|LTD)\b/gi,  // Common suffixes
  /\d{1,2}(?:\.\d)?°/g,                             // Loft angles: 10.5°, 9°
  /\b[SRX]{1}[\s-]?(?:FLEX|flex)\b/g,              // Flex info
  /\b(?:S|SR|R|A|L|X|XX)[\s-](?:シャフト|shaft)\b/gi,
];

function extractModelInfo(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  const upperText = text.toUpperCase();

  let foundBrand = '';
  let foundModels = [];
  let foundShaft = '';

  // 1. Find brand
  for (const brand of golfBrands) {
    if (upperText.includes(brand.toUpperCase())) {
      foundBrand = brand;
      break;
    }
  }

  // 2. Find shaft
  for (const shaft of shaftBrands) {
    if (upperText.includes(shaft.toUpperCase())) {
      foundShaft = shaft;
      break;
    }
  }

  // 3. Extract model-like strings from each line
  for (const line of lines) {
    // Skip very short or very long lines
    if (line.length < 2 || line.length > 60) continue;

    // Check if line looks like a model identifier
    const hasNumbers = /\d/.test(line);
    const hasLetters = /[A-Za-z]/.test(line);
    const lineUpper = line.toUpperCase();

    // Check against model patterns
    for (const pat of modelPatterns) {
      pat.lastIndex = 0;
      const matches = line.match(pat);
      if (matches) {
        foundModels.push(...matches);
      }
    }

    // Lines that contain brand + something else are likely model identifiers
    if (foundBrand && lineUpper.includes(foundBrand.toUpperCase()) && line.length > foundBrand.length + 2) {
      const modelPart = line.replace(new RegExp(foundBrand, 'gi'), '').trim();
      if (modelPart.length >= 2 && modelPart.length <= 30) {
        foundModels.unshift(modelPart);
      }
    }

    // Lines with alphanumeric mix that look like product codes
    if (hasNumbers && hasLetters && line.length >= 3 && line.length <= 25) {
      if (/^[A-Za-z0-9\s\-\.°]+$/.test(line)) {
        foundModels.push(line);
      }
    }
  }

  // Deduplicate
  foundModels = [...new Set(foundModels)].slice(0, 5);

  // Build display string
  let result = '';
  if (foundBrand) result += foundBrand;
  if (foundModels.length > 0) {
    const mainModel = foundModels[0];
    if (result && !mainModel.toUpperCase().includes(foundBrand.toUpperCase())) {
      result += ' ' + mainModel;
    } else if (!result) {
      result = mainModel;
    }
  }
  if (foundShaft && !result.toUpperCase().includes(foundShaft.toUpperCase())) {
    result += ' / ' + foundShaft;
  }

  // Fallback: use the most model-like line
  if (!result) {
    const candidateLines = lines.filter(l =>
      l.length >= 3 && l.length <= 40 &&
      /[A-Za-z0-9]/.test(l) &&
      !/^[\s\p{P}]+$/u.test(l)
    );
    if (candidateLines.length > 0) {
      result = candidateLines[0];
    }
  }

  return result || text.substring(0, 30);
}

// ===== Search URLs =====
function updateSearchLinks(query) {
  const q = encodeURIComponent('ゴルフ ' + query);
  const qPlain = encodeURIComponent(query);
  document.getElementById('linkMercari').href = `https://www.mercari.com/jp/search/?keyword=${q}&category_root=780`;
  document.getElementById('linkYahoo').href = `https://auctions.yahoo.co.jp/search/search?p=${q}&auccat=25458`;
  document.getElementById('linkRakuten').href = `https://search.rakuten.co.jp/search/mall/${q}/101164/`;
  document.getElementById('linkAmazon').href = `https://www.amazon.co.jp/s?k=${q}&i=sporting`;
  document.getElementById('linkGolfdo').href = `https://www.golfdo.com/cgi-bin/search/item_list.cgi?k=${qPlain}`;
  document.getElementById('linkGoogle').href = `https://www.google.com/search?q=${q}+中古+相場`;
}

// ===== Navigation =====
function switchPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

  if (page === 'scan') {
    document.getElementById('pageScan').classList.add('active');
    document.getElementById('navScan').classList.add('active');
  } else {
    document.getElementById('pageHistory').classList.add('active');
    document.getElementById('navHistory').classList.add('active');
    renderHistory();
  }
}

// ===== Camera / Gallery =====
function openCamera() { cameraInput.click(); }
function openGallery() { galleryInput.click(); }

function handleImage(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(ev) {
    currentImageData = ev.target.result;
    preview.src = currentImageData;
    preview.style.display = 'block';
    placeholder.style.display = 'none';
    captureArea.classList.add('has-image');
    scanBtn.classList.add('visible');
    modelCard.classList.remove('visible');
    rawTextSection.classList.remove('visible');
    tips.style.display = 'none';
  };
  reader.readAsDataURL(file);
  // Reset input so same file can be re-selected
  e.target.value = '';
}

cameraInput.addEventListener('change', handleImage);
galleryInput.addEventListener('change', handleImage);

// ===== OCR =====
async function startOCR() {
  if (!currentImageData) return;

  scanBtn.disabled = true;
  scanBtn.innerHTML = '<span class="spinner"></span> 読み取り中...';
  progressContainer.classList.add('visible');
  modelCard.classList.remove('visible');
  rawTextSection.classList.remove('visible');
  progressBar.style.width = '0%';
  progressBar.style.background = 'linear-gradient(90deg, var(--green), var(--green-bright))';
  progressLabel.textContent = '日本語データを読み込み中...';

  try {
    const result = await Tesseract.recognize(
      currentImageData,
      'jpn+eng',
      {
        logger: (m) => {
          if (m.status === 'recognizing text') {
            const pct = Math.round(m.progress * 100);
            progressBar.style.width = pct + '%';
            progressLabel.textContent = `テキスト認識中... ${pct}%`;
          } else if (m.status === 'loading language traineddata') {
            const pct = Math.round(m.progress * 100);
            progressBar.style.width = (pct * 0.5) + '%';
            progressLabel.textContent = `言語データ読み込み中... ${pct}%`;
          } else if (m.status === 'initializing api') {
            progressLabel.textContent = 'OCRエンジン初期化中...';
          }
        }
      }
    );

    const fullText = result.data.text.trim();
    const conf = Math.round(result.data.confidence);

    // Extract model info
    const modelInfo = extractModelInfo(fullText);

    // Display model card
    detectedModel.textContent = modelInfo;
    modelInput.value = modelInfo;
    updateSearchLinks(modelInfo);

    // Confidence badge
    confBadge.textContent = `精度 ${conf}%`;
    if (conf >= 70) confBadge.className = 'confidence-badge conf-high';
    else if (conf >= 40) confBadge.className = 'confidence-badge conf-mid';
    else confBadge.className = 'confidence-badge conf-low';

    modelCard.classList.add('visible');
    modelCard.classList.add('fade-in');

    // Raw text
    rawTextBox.textContent = fullText;
    rawTextSection.classList.add('visible');

    progressContainer.classList.remove('visible');

    // Save to history
    addToHistory(modelInfo, currentImageData, conf);

    // Scroll to result
    setTimeout(() => {
      modelCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);

  } catch (err) {
    progressLabel.textContent = 'エラー: ' + err.message;
    progressBar.style.width = '100%';
    progressBar.style.background = 'var(--red)';
    console.error('OCR Error:', err);
  } finally {
    scanBtn.disabled = false;
    scanBtn.innerHTML = '🔍 型番を読み取る';
  }
}

// ===== Update search links when input changes =====
modelInput.addEventListener('input', function() {
  updateSearchLinks(this.value);
  detectedModel.textContent = this.value;
});

// ===== Copy model =====
function copyModel() {
  const text = modelInput.value || detectedModel.textContent;
  if (!text) return;

  navigator.clipboard.writeText(text).then(() => {
    const original = detectedModel.textContent;
    detectedModel.textContent = 'コピーしました ✓';
    detectedModel.style.color = 'var(--green-bright)';
    setTimeout(() => {
      detectedModel.textContent = original;
      detectedModel.style.color = '#fff';
    }, 1200);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
}

// ===== Raw text toggle =====
function toggleRawText() {
  rawToggle.classList.toggle('open');
  rawTextBox.classList.toggle('open');
}

// ===== History =====
function addToHistory(model, imageData, confidence) {
  // Store thumbnail (resize to save memory)
  const thumbData = createThumbnail(imageData);

  scanHistory.unshift({
    model: model,
    thumb: thumbData,
    confidence: confidence,
    timestamp: new Date().toLocaleString('ja-JP'),
    date: Date.now()
  });

  // Keep max 50 items
  if (scanHistory.length > 50) scanHistory.pop();
}

function createThumbnail(dataUrl) {
  // For memory efficiency, just store the original (in real app, resize with canvas)
  return dataUrl;
}

function renderHistory() {
  const list = document.getElementById('historyList');
  const empty = document.getElementById('historyEmpty');
  const clearBtn = document.getElementById('historyClearBtn');

  if (scanHistory.length === 0) {
    empty.style.display = 'block';
    list.innerHTML = '';
    clearBtn.style.display = 'none';
    return;
  }

  empty.style.display = 'none';
  clearBtn.style.display = 'block';

  list.innerHTML = scanHistory.map((item, i) => `
    <div class="history-item" onclick="searchFromHistory(${i})">
      <img class="thumb" src="${item.thumb}" alt="">
      <div class="info">
        <div class="model-name">${escapeHtml(item.model)}</div>
        <div class="timestamp">${item.timestamp}</div>
      </div>
      <span class="search-icon">→</span>
    </div>
  `).join('');
}

function searchFromHistory(index) {
  const item = scanHistory[index];
  if (!item) return;

  // Switch to scan page and populate
  switchPage('scan');
  detectedModel.textContent = item.model;
  modelInput.value = item.model;
  updateSearchLinks(item.model);
  modelCard.classList.add('visible');
  rawTextSection.classList.remove('visible');

  if (item.thumb) {
    preview.src = item.thumb;
    preview.style.display = 'block';
    placeholder.style.display = 'none';
    captureArea.classList.add('has-image');
  }

  setTimeout(() => {
    modelCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function clearHistory() {
  if (confirm('読み取り履歴をすべて削除しますか？')) {
    scanHistory = [];
    renderHistory();
  }
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
</script>
